multitenancy:
  enabled: true
  tenants:
    - id: tenant1
      url: jdbc:postgresql://db:5432/tenant1_db
      username: user
      password: password
    - id: tenant2
      url: jdbc:postgresql://db:5432/tenant2_db
      username: user
      password: password
    - id: tenant3
      url: jdbc:postgresql://db:5432/tenant3_db
      username: user
      password: password

spring:
  application:
    name: demo-application
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      group:
        datasources:
          include: tenantDbHealthContributor
          show-components: always
